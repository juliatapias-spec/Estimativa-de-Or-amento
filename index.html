<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estimador de Orçamento</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f8f9fa;
      --bg3: #f1f3f5;
      --text: #111827;
      --text2: #6b7280;
      --text3: #9ca3af;
      --border: #e5e7eb;
      --border2: #d1d5db;
      --radius: 8px;
      --radius-lg: 12px;
      --green: #1D9E75; --green-bg: #E1F5EE; --green-text: #085041;
      --yellow: #EF9F27; --yellow-bg: #FAEEDA; --yellow-text: #633806;
      --red: #E24B4A; --red-bg: #FCEBEB; --red-text: #791F1F;
      --blue-bg: #E6F1FB; --blue-text: #0C447C;
      --purple-bg: #EEEDFE; --purple-text: #3C3489;
      --gray-bg: #D3D1C7; --gray-text: #2C2C2A;
      --orange-bg: #FAC775; --orange-text: #412402;
      --pink-bg: #FBEAF0; --pink-text: #72243E;
      --teal-bg: #E1F5EE; --teal-text: #085041;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); font-size: 14px; min-height: 100vh; }

    header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 15px; font-weight: 600; letter-spacing: -.02em; }
    .logo span { color: var(--text2); font-weight: 400; }
    #conn-status { font-size: 12px; display: flex; align-items: center; gap: 6px; color: var(--text2); }
    #conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); }
    #conn-dot.ok { background: var(--green); }
    #conn-dot.err { background: var(--red); }

    .tabs { background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; gap: 0; }
    .tab { padding: 14px 18px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 14px; color: var(--text2); font-family: inherit; transition: .15s; }
    .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
    .tab:hover:not(.active) { color: var(--text); }

    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .panel { display: none; } .panel.active { display: block; }

    .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .sec-head h2 { font-size: 16px; font-weight: 600; }

    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .metric { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
    .metric-val { font-size: 22px; font-weight: 600; margin-bottom: 2px; }
    .metric-lbl { font-size: 12px; color: var(--text2); }

    .form-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
    .form-box-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 1rem; }

    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 110px; }
    .field label { font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
    input, select, textarea { padding: 8px 10px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; width: 100%; transition: border-color .15s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #6b7280; }

    .btn { padding: 8px 16px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; transition: background .15s; }
    .btn:hover { background: var(--bg3); }
    .btn.primary { background: var(--text); color: var(--bg); border-color: transparent; }
    .btn.primary:hover { opacity: .85; }
    .btn.sm { padding: 4px 10px; font-size: 12px; }
    .btn.danger { color: var(--red-text); border-color: #f9a8a8; }
    .btn.danger:hover { background: var(--red-bg); }

    .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-row input { flex: 1; min-width: 200px; }
    .filter-row select { width: auto; min-width: 150px; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .age-badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }

    .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 1rem; font-size: 12px; color: var(--text2); align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 5px; }

    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--bg2); }
    tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg2); }

    .conf-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .c-alta { background: var(--green); } .c-media { background: var(--yellow); } .c-baixa { background: var(--red); }
    .racional { font-size: 11px; color: var(--text2); margin-top: 3px; font-style: italic; line-height: 1.4; }

    .loading { display: flex; align-items: center; gap: 10px; padding: 2.5rem; color: var(--text2); font-size: 13px; justify-content: center; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { padding: 3rem; text-align: center; color: var(--text2); font-size: 13px; }
    .err-box { border: 1px dashed #f9a8a8; border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; color: var(--red-text); font-size: 13px; background: var(--red-bg); }
    .info-box { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; background: var(--blue-bg); color: var(--blue-text); font-size: 13px; line-height: 1.6; margin-bottom: 1.25rem; }

    .total-bar { display: flex; justify-content: flex-end; align-items: baseline; gap: 12px; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .obs-box { background: var(--bg2); border-radius: var(--radius); padding: 1rem; margin-top: 1rem; font-size: 12px; color: var(--text2); line-height: 1.7; }

    @media (max-width: 640px) {
      main { padding: 1rem; }
      .metrics { grid-template-columns: 1fr 1fr; }
      header { padding: 0 1rem; }
      .tabs { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Estimador <span>/ Eventos & Cenografia</span></div>
  <div id="conn-status"><span id="conn-dot"></span><span id="conn-label">Conectando...</span></div>
</header>

<nav class="tabs">
  <button class="tab active" onclick="go('base')">Base de dados</button>
  <button class="tab" onclick="go('estimar')">Nova estimativa</button>
  <button class="tab" onclick="go('config')">Configurações</button>
</nav>

<main>
  <div id="p-base"    class="panel active"></div>
  <div id="p-estimar" class="panel"></div>
  <div id="p-config"  class="panel"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ─── CONFIGURAÇÃO ───────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://tfmkgnauccdiodvsroqr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmbWtnbmF1Y2NkaW9kdnNyb3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzIzNDAsImV4cCI6MjA5MDY0ODM0MH0.EwJJIu_nQEnS9y6N2C5kao9XDF6gT2R2ReIAYjd6LeU';
// ────────────────────────────────────────────────────────────────────────────

const CATS = ['Mobiliário','Tecnologia AV','Estrutura','Iluminação','Sinalização','Cenografia','Serviços','Outros'];

let db = [], cfg = { markup: 20, rules: '' }, tab = 'base';
let showForm = false, filterTxt = '', filterCat = '', filterAge = '';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Helpers ─────────────────────────────────────────────────────────────────
function fmt(v) { return 'R$ ' + Math.round(v).toLocaleString('pt-BR'); }
function today() { return new Date().toISOString().slice(0, 10); }
function monthsAgo(iso) {
  if (!iso) return 999;
  const d = new Date(iso), now = new Date();
  return (now.getFullYear() - d.getFullYear()) * 12 + (now.getMonth() - d.getMonth());
}
function fmtDate(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function ageBadge(iso) {
  const m = monthsAgo(iso);
  if (m <= 6)  return `<span class="age-badge" style="background:var(--green-bg);color:var(--green-text)">Recente</span>`;
  if (m <= 18) return `<span class="age-badge" style="background:var(--yellow-bg);color:var(--yellow-text)">${m}m atrás</span>`;
  return `<span class="age-badge" style="background:var(--red-bg);color:var(--red-text)">${Math.floor(m/12)}a ${m%12}m atrás</span>`;
}
function ageMatch(iso, filter) {
  const m = monthsAgo(iso);
  if (filter === 'fresh') return m <= 6;
  if (filter === 'mid')   return m > 6 && m <= 18;
  if (filter === 'old')   return m > 18;
  return true;
}
const catClr = {
  'Mobiliário':   'background:var(--blue-bg);color:var(--blue-text)',
  'Tecnologia AV':'background:var(--purple-bg);color:var(--purple-text)',
  'Estrutura':    'background:var(--gray-bg);color:var(--gray-text)',
  'Iluminação':   'background:var(--yellow-bg);color:var(--yellow-text)',
  'Sinalização':  'background:var(--orange-bg);color:var(--orange-text)',
  'Cenografia':   'background:var(--pink-bg);color:var(--pink-text)',
  'Serviços':     'background:var(--teal-bg);color:var(--teal-text)',
  'Outros':       'background:var(--bg3);color:var(--text2)',
};
function cs(c) { return catClr[c] || catClr['Outros']; }

// ── Supabase ─────────────────────────────────────────────────────────────────
async function loadItems() {
  const { data, error } = await sb.from('items').select('*').order('created_at', { ascending: false });
  if (!error && data) db = data;
}
async function insertItem(item) {
  const { data, error } = await sb.from('items').insert(item).select().single();
  if (!error && data) db.unshift(data);
  return !error;
}
async function removeItem(id) {
  await sb.from('items').delete().eq('id', id);
  db = db.filter(d => d.id !== id);
}
async function loadConfig() {
  const { data } = await sb.from('config').select('*').eq('id', 1).single();
  if (data) cfg = { markup: data.markup, rules: data.rules || '' };
}
async function saveConfigDb() {
  await sb.from('config').upsert({ id: 1, markup: cfg.markup, rules: cfg.rules });
}

// ── Tab navigation ────────────────────────────────────────────────────────────
function go(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', ['base','estimar','config'][i] === t));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('p-' + t).classList.add('active');
  if (t === 'base')    rBase();
  if (t === 'estimar') rEstimar();
  if (t === 'config')  rConfig();
}

// ── Base de dados ─────────────────────────────────────────────────────────────
function rBase() {
  const fd = db.filter(d =>
    (!filterCat || d.cat === filterCat) &&
    (!filterTxt || [d.item, d.descricao, d.sup, d.cat].some(s => s && s.toLowerCase().includes(filterTxt.toLowerCase()))) &&
    (!filterAge || ageMatch(d.date, filterAge))
  );
  const cats = [...new Set(db.map(d => d.cat))];
  const stale = db.filter(d => monthsAgo(d.date) > 12).length;
  const p = document.getElementById('p-base');

  p.innerHTML = `
    <div class="sec-head">
      <h2>Itens de projetos anteriores</h2>
      <button class="btn" onclick="toggleForm()">+ Adicionar item</button>
    </div>
    <div id="af-wrap"></div>
    <div class="metrics">
      <div class="metric"><div class="metric-val">${db.length}</div><div class="metric-lbl">Itens na base</div></div>
      <div class="metric"><div class="metric-val">${cats.length}</div><div class="metric-lbl">Categorias</div></div>
      <div class="metric" style="${stale > 0 ? 'border-color:#f9a8a8' : ''}">
        <div class="metric-val" style="${stale > 0 ? 'color:var(--red-text)' : ''}">${stale}</div>
        <div class="metric-lbl">Cotações com +1 ano</div>
      </div>
    </div>
    <div class="legend">
      <span style="font-weight:500;font-size:11px">Antiguidade:</span>
      <span class="legend-item"><span class="age-badge" style="background:var(--green-bg);color:var(--green-text)">Recente</span> até 6 meses</span>
      <span class="legend-item"><span class="age-badge" style="background:var(--yellow-bg);color:var(--yellow-text)">Xm atrás</span> 7–18 meses</span>
      <span class="legend-item"><span class="age-badge" style="background:var(--red-bg);color:var(--red-text)">Xa atrás</span> +18 meses</span>
    </div>
    <div class="filter-row">
      <input placeholder="Buscar item, descritivo, fornecedor..." value="${filterTxt}" oninput="filterTxt=this.value;rBase()">
      <select onchange="filterCat=this.value;rBase()">
        <option value="">Todas as categorias</option>
        ${CATS.map(c => `<option value="${c}"${filterCat===c?' selected':''}>${c}</option>`).join('')}
      </select>
      <select onchange="filterAge=this.value;rBase()">
        <option value="">Qualquer data</option>
        <option value="fresh"${filterAge==='fresh'?' selected':''}>Até 6 meses</option>
        <option value="mid"${filterAge==='mid'?' selected':''}>7–18 meses</option>
        <option value="old"${filterAge==='old'?' selected':''}>+18 meses</option>
      </select>
    </div>
    ${fd.length ? `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Categoria</th><th>Item</th><th>Descritivo</th>
          <th style="text-align:right">Qtd</th>
          <th style="text-align:right">Unitário</th>
          <th style="text-align:right">Total</th>
          <th>Fornecedor</th>
          <th>Data cotação</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${fd.map(d => `<tr>
            <td><span class="badge" style="${cs(d.cat)}">${d.cat}</span></td>
            <td style="font-weight:500;white-space:nowrap">${d.item}</td>
            <td style="color:var(--text2);font-size:12px;max-width:200px">${d.descricao || '—'}</td>
            <td style="text-align:right">${d.qty}</td>
            <td style="text-align:right">${fmt(d.unit)}</td>
            <td style="text-align:right;font-weight:500">${fmt(d.total)}</td>
            <td style="color:var(--text2);font-size:12px;white-space:nowrap">${d.sup}</td>
            <td style="white-space:nowrap">
              <div style="font-size:12px;color:var(--text2);margin-bottom:3px">${fmtDate(d.date)}</div>
              ${ageBadge(d.date)}
            </td>
            <td><button class="btn sm danger" onclick="doDelete(${d.id})">×</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    ${fd.length < db.length ? `<div style="font-size:12px;color:var(--text2);margin-top:8px;text-align:right">${fd.length} de ${db.length} itens</div>` : ''}
    ` : `<div class="empty">Nenhum item encontrado.</div>`}
  `;
  if (showForm) renderForm();
}

function toggleForm() {
  showForm = !showForm;
  showForm ? renderForm() : (document.getElementById('af-wrap').innerHTML = '');
}

function renderForm() {
  const w = document.getElementById('af-wrap');
  if (!w) return;
  w.innerHTML = `
    <div class="form-box" style="margin-bottom:1.25rem">
      <div class="form-box-title">Novo item</div>
      <div class="row">
        <div class="field" style="max-width:160px"><label>Categoria</label>
          <select id="af-cat">${CATS.map(c => `<option>${c}</option>`).join('')}</select>
        </div>
        <div class="field" style="flex:2"><label>Item</label><input id="af-item" placeholder="Ex: Poltrona executiva"></div>
        <div class="field" style="flex:3"><label>Descritivo</label><input id="af-descricao" placeholder="Especificações: dimensão, cor, material..."></div>
      </div>
      <div class="row">
        <div class="field" style="max-width:90px"><label>Quantidade</label><input id="af-qty" type="number" min="1" value="1" oninput="calcT()"></div>
        <div class="field" style="max-width:130px"><label>Unitário R$</label><input id="af-unit" type="number" placeholder="0" oninput="calcT()"></div>
        <div class="field" style="max-width:130px"><label>Total R$</label><input id="af-tot" type="number" placeholder="auto" style="color:var(--text2)"></div>
        <div class="field"><label>Fornecedor</label><input id="af-sup" placeholder="Nome do fornecedor"></div>
        <div class="field" style="max-width:160px"><label>Data da cotação</label><input id="af-date" type="date" value="${today()}"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="toggleForm()">Cancelar</button>
        <button class="btn primary" onclick="doAdd()">Salvar item</button>
      </div>
    </div>
  `;
}

function calcT() {
  const q = parseFloat(document.getElementById('af-qty')?.value) || 0;
  const u = parseFloat(document.getElementById('af-unit')?.value) || 0;
  const t = document.getElementById('af-tot');
  if (t && q && u) t.value = Math.round(q * u);
}

async function doAdd() {
  const item = document.getElementById('af-item')?.value.trim();
  if (!item) { alert('Informe o nome do item'); return; }
  const qty  = parseFloat(document.getElementById('af-qty').value) || 1;
  const unit = parseFloat(document.getElementById('af-unit').value) || 0;
  const btn  = document.querySelector('#af-wrap .btn.primary');
  btn.disabled = true; btn.textContent = 'Salvando...';
  const ok = await insertItem({
    cat:   document.getElementById('af-cat').value,
    item,
    descricao:  document.getElementById('af-descricao').value.trim(),
    qty, unit,
    total: parseFloat(document.getElementById('af-tot').value) || (qty * unit),
    sup:   document.getElementById('af-sup').value.trim() || '—',
    date:  document.getElementById('af-date').value || today(),
  });
  showForm = false;
  rBase();
}

async function doDelete(id) {
  if (!confirm('Remover este item da base?')) return;
  await removeItem(id);
  rBase();
}

// ── Nova estimativa ───────────────────────────────────────────────────────────
function rEstimar() {
  document.getElementById('p-estimar').innerHTML = `
    <div class="sec-head"><h2>Nova estimativa de orçamento</h2></div>
    <div class="form-box">
      <div class="form-box-title">Descreva os itens que você precisa para o projeto</div>
      <textarea id="est-in" rows="7" placeholder="Ex:&#10;35 poltronas executivas&#10;1 painel de LED 3x3m&#10;5 totens de sinalização&#10;1 sistema de som para 300 pessoas&#10;10 mesas redondas" style="margin-bottom:1rem;resize:vertical"></textarea>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <span style="font-size:12px;color:var(--text2)">A IA cruza com a base e pondera a data de cada cotação ao gerar os valores.</span>
        <button class="btn primary" onclick="gerarEstimativa()">Gerar estimativa com IA →</button>
      </div>
    </div>
    <div id="est-res"></div>
  `;
}

async function gerarEstimativa() {
  const input = document.getElementById('est-in')?.value.trim();
  if (!input) { alert('Descreva os itens necessários.'); return; }
  if (!db.length) { alert('Adicione itens à base de dados primeiro.'); return; }

  const res = document.getElementById('est-res');
  res.innerHTML = `<div class="loading"><div class="spinner"></div> Analisando base de dados e gerando estimativa com IA...</div>`;

  const dbCtx = db.map(d => {
    const m = monthsAgo(d.date);
    const age = m <= 6 ? 'cotação recente' : m <= 18 ? `cotação de ${m} meses atrás` : `cotação desatualizada (${Math.floor(m/12)}a ${m%12}m atrás)`;
    return `[${d.cat}] ${d.item} | ${d.descricao} | Qtd ref: ${d.qty} | Unitário: R$${d.unit} | Fornecedor: ${d.sup} | Data: ${fmtDate(d.date)} (${age})`;
  }).join('\n');

  const sys = `Você é assistente especializado em orçamentos para produção de eventos e cenografia no Brasil.
Data de hoje: ${today()}

BASE DE DADOS (itens de projetos anteriores com data de cotação):
${dbCtx}

REGRAS:
- Markup padrão: ${cfg.markup}%
- Cotações com mais de 18 meses devem ser tratadas com cautela — indique no racional e aplique reajuste estimado de IGPM (aproximadamente 5–8% ao ano)
- Cotações recentes (até 6 meses) têm alta confiabilidade
${cfg.rules ? `- Regras adicionais:\n${cfg.rules}` : ''}

INSTRUÇÕES:
Para cada item solicitado:
1. Busque o item idêntico ou mais similar na base
2. Se não houver correspondência exata, faça racional por m², quantidade ou categoria similar
3. Considere a data da cotação — itens antigos devem ter racional explícito sobre desatualização
4. "unitario_base" = valor SEM markup; "unitario_final" = COM markup
5. Confiança: "alta" = item recente e idêntico; "media" = similar ou ajuste de qty; "baixa" = estimativa por analogia ou cotação desatualizada
6. "racional" = 1 frase curta explicando o valor e mencionando a data se relevante

Retorne SOMENTE JSON válido, sem markdown:
{"itens":[{"solicitado":"texto","item_base":"nome na base","fornecedor":"fornecedor","quantidade":N,"unitario_base":N,"unitario_final":N,"total":N,"confianca":"alta|media|baixa","racional":"frase"}],"total_geral":N,"observacoes":"texto"}`;

  try {
    const r = await fetch('/api/estimate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1500, system: sys, messages: [{ role: 'user', content: input }] })
    });
    const data = await r.json();
    const txt = data.content.map(b => b.type === 'text' ? b.text : '').join('');
    const m = txt.replace(/```json|```/g, '').trim().match(/\{[\s\S]*\}/);
    if (!m) throw new Error('no json');
    renderResult(JSON.parse(m[0]));
  } catch (e) {
    res.innerHTML = `<div class="err-box">Não foi possível gerar a estimativa. Verifique a configuração da API e tente novamente.</div>`;
  }
}

function renderResult(r) {
  const cl = { alta: 'c-alta', media: 'c-media', baixa: 'c-baixa' };
  const lbl = { alta: 'Alta', media: 'Média', baixa: 'Baixa' };
  const rows = r.itens.map(it => `<tr>
    <td><div style="font-weight:500">${it.solicitado}</div><div class="racional">${it.racional}</div></td>
    <td style="font-size:12px;color:var(--text2);white-space:nowrap">${it.item_base}</td>
    <td style="font-size:12px;color:var(--text2);white-space:nowrap">${it.fornecedor}</td>
    <td style="text-align:right">${it.quantidade}</td>
    <td style="text-align:right;color:var(--text2);font-size:12px">${fmt(it.unitario_base)}</td>
    <td style="text-align:right;font-size:12px">${fmt(it.unitario_final)}</td>
    <td style="text-align:right;font-weight:500">${fmt(it.total)}</td>
    <td style="text-align:center"><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px">
      <span class="conf-dot ${cl[it.confianca]||'c-baixa'}"></span>${lbl[it.confianca]||it.confianca}
    </span></td>
  </tr>`).join('');

  document.getElementById('est-res').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Item solicitado / racional</th><th>Referência na base</th><th>Fornecedor</th>
          <th style="text-align:right">Qtd</th>
          <th style="text-align:right">Unit. base</th>
          <th style="text-align:right">Unit. +markup</th>
          <th style="text-align:right">Total</th>
          <th style="text-align:center">Confiança</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="total-bar">
      <span style="font-size:13px;color:var(--text2)">Total estimado (markup ${cfg.markup}%)</span>
      <span style="font-size:24px;font-weight:700">${fmt(r.total_geral)}</span>
    </div>
    ${r.observacoes ? `<div class="obs-box"><strong>Observações:</strong> ${r.observacoes}</div>` : ''}
    <div style="margin-top:1rem;font-size:11px;color:var(--text2)">Valores são estimativas com base em projetos anteriores. Use como referência antes de consultar fornecedores.</div>
  `;
}

// ── Configurações ─────────────────────────────────────────────────────────────
function rConfig() {
  document.getElementById('p-config').innerHTML = `
    <div class="sec-head"><h2>Configurações e regras</h2></div>
    <div class="form-box">
      <div class="form-box-title">Markup de precificação</div>
      <div class="row" style="align-items:flex-end">
        <div class="field" style="max-width:150px">
          <label>Markup global (%)</label>
          <input id="cfg-mkp" type="number" min="0" max="300" value="${cfg.markup}">
        </div>
        <div style="font-size:12px;color:var(--text2);padding-bottom:10px;flex:1">
          Percentual aplicado sobre o valor de referência da base ao gerar estimativas.
        </div>
      </div>
    </div>
    <div class="form-box">
      <div class="form-box-title">Regras de estimativa</div>
      <textarea id="cfg-rules" rows="8" placeholder="Escreva as regras que a IA deve seguir ao gerar estimativas. Exemplos:&#10;- Iluminação deve incluir 20% de reserva técnica&#10;- Eventos em outras cidades: adicionar 15% de logística&#10;- Para eventos acima de 2 dias, aplicar desconto de 10% em mobiliário&#10;- Sempre sugerir 2 técnicos de AV para eventos com painel de LED" style="resize:vertical">${cfg.rules}</textarea>
    </div>
    <div class="form-box">
      <div class="form-box-title">Critério de antiguidade das cotações</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.8">
        A IA considera automaticamente a data de cada cotação ao gerar estimativas.<br>
        <span style="display:inline-flex;align-items:center;gap:6px;margin-top:4px"><span class="age-badge" style="background:var(--green-bg);color:var(--green-text)">Recente</span> até 6 meses — alta confiabilidade</span><br>
        <span style="display:inline-flex;align-items:center;gap:6px;margin-top:4px"><span class="age-badge" style="background:var(--yellow-bg);color:var(--yellow-text)">Xm atrás</span> 7–18 meses — confiabilidade média</span><br>
        <span style="display:inline-flex;align-items:center;gap:6px;margin-top:4px"><span class="age-badge" style="background:var(--red-bg);color:var(--red-text)">Xa atrás</span> +18 meses — atenção, considerar reajuste</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:12px">
      <span id="cfg-ok" style="font-size:12px;color:var(--green);display:none">Configurações salvas.</span>
      <button class="btn primary" onclick="saveCfgForm()">Salvar configurações</button>
    </div>
  `;
}

async function saveCfgForm() {
  cfg.markup = parseFloat(document.getElementById('cfg-mkp').value) || 20;
  cfg.rules  = document.getElementById('cfg-rules').value.trim();
  const btn = document.querySelector('#p-config .btn.primary');
  btn.disabled = true; btn.textContent = 'Salvando...';
  await saveConfigDb();
  btn.disabled = false; btn.textContent = 'Salvar configurações';
  const ok = document.getElementById('cfg-ok');
  ok.style.display = 'inline'; setTimeout(() => ok.style.display = 'none', 2500);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');

  if (SUPABASE_URL === 'COLE_AQUI_SUA_URL') {
    dot.className = 'err'; label.textContent = 'Supabase não configurado';
    document.getElementById('p-base').innerHTML = `
      <div class="info-box">
        <strong>Configure o Supabase para começar.</strong><br>
        Abra o arquivo <code>index.html</code>, localize as linhas <code>SUPABASE_URL</code> e <code>SUPABASE_KEY</code> no início do script e substitua pelos valores do seu projeto. Veja o README.md para o passo a passo completo.
      </div>`;
    return;
  }

  try {
    await loadConfig();
    await loadItems();
    dot.className = 'ok'; label.textContent = 'Conectado';
  } catch (e) {
    dot.className = 'err'; label.textContent = 'Erro de conexão';
  }

  rBase(); rEstimar(); rConfig();
}

boot();
</script>
